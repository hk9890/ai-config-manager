version: 2

project_name: aimgr

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: ./cmd/aimgr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.Version={{.Version}}
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.GitCommit={{.ShortCommit}}
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.BuildDate={{.Date}}
  # Windows build omits -s -w to retain debug symbols and avoid
  # false-positive detections by Windows Defender / SmartScreen.
  - id: windows
    main: ./cmd/aimgr
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.Version={{.Version}}
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.GitCommit={{.ShortCommit}}
      - -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
