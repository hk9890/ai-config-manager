name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate install.sh syntax
        run: bash -n scripts/install.sh

      - name: Validate install.ps1 syntax
        shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Join-Path $PWD 'scripts/install.ps1'), [ref]$tokens, [ref]$errors) > $null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { $_.ToString() }
            exit 1
          }

      - name: Configure Git
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      - name: Run vet
        run: make vet

      - name: Run golangci-lint
        run: make lint

      - name: Build binary
        run: make build

      - name: Run tests
        run: go test -race ./...

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      - name: Build binary
        run: make build

      - name: Run E2E tests
        run: make e2e-test
        timeout-minutes: 10

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-logs
          path: |
            **/*.log
            **/test-output/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="ai-repo-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          
          go build \
            -ldflags "-s -w -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.Version=${{ steps.version.outputs.version }} -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.GitCommit=${{ steps.version.outputs.commit }} -X github.com/dynatrace-oss/ai-config-manager/v3/pkg/version.BuildDate=${{ steps.version.outputs.date }}" \
            -o "bin/${BINARY_NAME}" \
            ./cmd/aimgr

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-repo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/*
          if-no-files-found: error
          retention-days: 30
